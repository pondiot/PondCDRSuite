name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get short SHA
        id: sha
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CDR_SYNC_SERVER_HOST }}
          username: ${{ secrets.CDR_SYNC_SERVER_USER }}
          key: ${{ secrets.CDR_SYNC_SERVER_SSH_KEY }}
          port: ${{ secrets.CDR_SYNC_SERVER_PORT || 22 }}
          script_stop: false
          script: |
            set -e

            DEPLOY_DIR="/home/cdr_admin/PondCDRSuite"
            VERSION="${{ steps.sha.outputs.short_sha }}"

            echo "=========================================="
            echo "🚀 PondCDRSuite Deployment"
            echo "=========================================="
            echo "Version: $VERSION"
            echo "Deploy Path: $DEPLOY_DIR"
            echo "=========================================="

            # Check git
            echo ""
            echo -n "  ✓ Git: "
            if command -v git >/dev/null 2>&1; then
              git --version
            else
              echo "❌ NOT FOUND"
              exit 1
            fi

            # Check deploy directory
            echo -n "  ✓ Deploy directory: "
            if [ -d "$DEPLOY_DIR" ]; then
              echo "EXISTS"
            else
              echo "❌ NOT FOUND"
              exit 1
            fi

            echo ""
            echo "=========================================="
            echo "📦 Git Pull"
            echo "=========================================="

            cd "$DEPLOY_DIR" || exit 1

            # Check if .git exists
            if [ ! -d ".git" ]; then
              echo "ERROR: Not a git repository"
              exit 1
            fi

            # Stash local changes before pull
            echo ""
            echo "  → Stashing local changes..."
            git stash push -u -m "Deploy stash $VERSION" \
              -- '*.env' \
              'cdr_sync/configs/*' \
              'cdr_sync/logs/*' \
              2>&1 || echo "  (nothing to stash)"

            echo "  → Fetching origin..."
            git fetch origin 2>&1 || {
              echo "ERROR: git fetch failed"
              exit 1
            }

            echo "  → Pulling origin/main..."
            git pull origin main 2>&1 || {
              echo "ERROR: git pull failed"
              exit 1
            }

            echo "  ✓ Repository updated"

            # Show current commit
            echo ""
            echo "  Current commit:"
            git log -1 --oneline

            # Ensure scripts are executable
            echo ""
            echo "=========================================="
            echo "🔧 Permissions"
            echo "=========================================="

            if [ -f "cdr_sync/cdr_sync.sh" ]; then
              chmod +x cdr_sync/cdr_sync.sh
              echo "  ✓ cdr_sync.sh is executable"
            fi

            if [ -f "cdr_sync/send_alert.py" ]; then
              chmod +x cdr_sync/send_alert.py
              echo "  ✓ send_alert.py is executable"
            fi

            # Check cron status
            echo ""
            echo "=========================================="
            echo "⏰ Cron Status"
            echo "=========================================="

            if systemctl is-active --quiet cron 2>/dev/null; then
              echo "  ✓ Cron service is running"
            else
              echo "  ⚠️  Cron service is not running"
            fi

            echo ""
            echo "=========================================="
            echo "✅ Deployment Successful!"
            echo "=========================================="
            echo "Version: $VERSION"
            echo ""
